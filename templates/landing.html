<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>SIMEMEK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #e7e6e1;
    --ink: #161616;
    --gray: #6b6b66;
    --line: #161616;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);
    background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
    background-size: 6px 6px;
    font-family: 'Courier New', monospace;
  }

  @keyframes retroBlink {
    0%, 20%, 40%, 60%, 80%, 100% { opacity: 1; filter: invert(0); }
    10%, 30%, 50%, 70%, 90% { opacity: 0.2; filter: invert(1); }
  }

  .phone{
    width:100%;
    max-width:900px;
    padding:40px 24px;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .ghost-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:0px; /* Jarak dibuat lebih dekat */
    position:relative;
  }

  h1.brand{
    font-family:'Press Start 2P', monospace;
    text-align:center;
    font-size:52px;
    line-height:1.25;
    margin:0 0 24px;
    color:var(--ink);
  }

  .domain-pill{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin-bottom:36px;
  }
  .domain-pill .rule{
    height:2px;
    width:36px;
    background:var(--ink);
  }
  .domain-pill .pill{
    background:transparent;
    color:var(--ink);
    font-family:'Press Start 2P', monospace;
    font-size:12px;
    text-align:center;
    line-height:1.4;
    padding:14px 20px;
    border-radius:0; /* Sudut tajam bergaya 8-bit */
    white-space: nowrap;
  }

  .cta{
    border:4px solid var(--ink);
    padding:6px;
    margin-bottom:14px;
    width: 100%;
    max-width: 450px;
  }
  .cta button{
    width:100%;
    background:var(--ink);
    color:var(--bg);
    border:none;
    font-family:'Press Start 2P', monospace;
    font-size:20px;
    padding:20px 0;
    cursor:pointer;
    letter-spacing:1px;
    transition: opacity 0.2s;
  }
  .cta button:hover{ opacity:.85; }

  .screen{ display:block; width: 100%; display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
<audio id="bg-music" src="/static/cosasvascas-musica-bit-para-videojuego-indie-114696.mp3" autoplay loop preload="auto"></audio>

<a href="https://github.com/akbarnurrahim/SIMEMEK" target="_blank" style="position: absolute; bottom: 16px; right: 16px; text-decoration: none; color: var(--ink); opacity: 0.7; transition: opacity 0.2s; display: flex; align-items: center; gap: 8px; font-family: 'Press Start 2P', monospace; font-size: 10px;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'" title="GitHub Repository">
  <svg height="20" aria-hidden="true" viewBox="0 0 16 16" version="1.1" width="20" fill="currentColor" style="shape-rendering: crispEdges;">
      <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.46-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path>
  </svg>
  GITHUB REPOSITORY
</a>

<div class="phone" style="flex-direction: row; justify-content: space-between; align-items: center; max-width: 1200px; gap: 40px;">
    <div class="left-panel" style="flex: 1.2; display: flex; flex-direction: column; align-items: flex-start;">
    <div class="ghost-wrap" style="position: relative; display: inline-block;">
      <img id="brand-image" src="/static/character-new2.png" alt="Character Logo" width="450" height="450" style="object-fit: contain; image-rendering: pixelated; margin-bottom: 20px;">
      <img id="btn-toggle-app" src="/static/arrow-right.png" onclick="toggleAppMode()" style="position: absolute; right: -120px; left: auto; top: 50%; transform: translateY(-50%); width: 120px; cursor: pointer; transition: transform 0.1s; image-rendering: pixelated;" alt="Toggle Mode">
    </div>
    
    <div style="display: flex; align-items: center; justify-content: center; width: 450px; margin-bottom: 10px;">
      <h1 id="brand-title" class="brand" style="margin: 0; text-align: center;">SIMEMEK</h1>
    </div>
    
    <div class="domain-pill" style="margin-bottom: 0; justify-content: flex-start; gap: 0; margin-left: -80px;">
      <span id="brand-subtitle" class="pill" style="padding-left: 0;">Smart Image Metadata Extraction Mapping Engine Kit</span>
    </div>
  </div>

  <div class="right-panel" style="flex: 0.8; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px;">
    <div id="screen-home" class="screen" style="width: 100%;">
      <div class="cta" style="width: 100%; max-width: 400px; margin: 0 auto;">
        <button onclick="showNameScreen()">▸ ENTER WORKSPACE</button>
      </div>
    </div>

    <div id="screen-name" class="screen" style="display: none; width: 100%;">
      <h2 style="font-family: 'Press Start 2P', monospace; font-size: 20px; margin-bottom: 40px; text-align: center;">IDENTIFY YOURSELF</h2>
      
      <input type="text" id="username-input" placeholder="GUEST" style="width: 100%; max-width: 400px; background: transparent; border: 4px solid var(--ink); color: var(--ink); font-family: 'Press Start 2P', monospace; font-size: 24px; padding: 20px; text-align: center; margin-bottom: 40px; text-transform: uppercase; outline: none;" autocomplete="off" maxlength="12">
      
      <div class="cta" style="max-width: 400px; width: 100%; margin: 0 auto;">
        <button id="btn-enter-game" style="font-size: 24px; padding: 20px 0;">▸ START</button>
      </div>
    </div>
  </div>

  <div id="screen-opening" class="screen" style="display: none; position: fixed; inset: 0; background: var(--bg); background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px); background-size: 6px 6px; color: var(--ink); flex-direction: column; align-items: center; justify-content: center; z-index: 999;">
    <h2 style="font-family: 'Press Start 2P', monospace; font-size: 24px; margin-bottom: 30px;">LOADING...</h2>
    
    <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
      <div style="width: 400px; height: 34px; border: 4px solid var(--ink); padding: 4px; display: flex;">
        <div id="loading-bar" style="height: 100%; width: 0%; background: var(--ink); transition: width 0.1s linear;"></div>
      </div>
      <span id="loading-percent" style="font-family: 'Press Start 2P', monospace; font-size: 20px; width: 60px;">0%</span>
    </div>
    
    <p id="loading-status" style="font-family: 'Press Start 2P', monospace; font-size: 12px; text-align: center; opacity: 0.8; height: 20px;">Initializing engine...</p>
  </div>
</div>

<script>
  // Attempt to play audio as early as possible
  function initAudio() {
    const bg = document.getElementById('bg-music');
    if (bg && bg.paused) {
      bg.volume = 0.5;
      bg.play().catch(()=>{});
    }
  }
  document.addEventListener('click', initAudio, { once: true });
  document.addEventListener('keydown', initAudio, { once: true });

  function showNameScreen() {
    const bg = document.getElementById('bg-music');
    if (bg) {
      bg.volume = 0.5;
      bg.play().catch(e => console.log("Autoplay blocked until user interaction", e));
    }
    document.getElementById('screen-home').style.display = 'none';
    document.getElementById('screen-name').style.display = 'flex';
    document.getElementById('username-input').focus();
  }
  
  let isSitititMode = false;
  function toggleAppMode() {
    isSitititMode = !isSitititMode;
    const title = document.getElementById('brand-title');
    const subtitle = document.getElementById('brand-subtitle');
    const img = document.getElementById('brand-image');
    const btnToggle = document.getElementById('btn-toggle-app');
    const panel = document.querySelector('.left-panel');
    
    // Putar sound effect jika ada
    const hoverSound = document.getElementById('hover-sound');
    if(hoverSound) {
        hoverSound.currentTime = 0;
        hoverSound.play().catch(()=>{});
    }

    // Trigger animasi blink ala retro game
    panel.style.animation = 'none';
    void panel.offsetWidth; // force reflow
    panel.style.animation = 'retroBlink 0.6s steps(2, end)';
    
    // Ganti konten tepat di tengah-tengah animasi
    setTimeout(() => {
      if(isSitititMode) {
        // Pindah ke kiri dan balik arah
        btnToggle.style.right = 'auto';
        btnToggle.style.left = '-120px';
        btnToggle.style.transform = 'translateY(-50%) scaleX(-1)';
        
        title.innerText = 'SITITIT';
        subtitle.innerText = 'Smart Image Training Intelligence Tiling & Indexing Tool';
        img.src = '/static/character-titit.png';
        img.onerror = () => { img.src = '/static/character-new2.png'; }; // fallback
      } else {
        // Pindah ke kanan dan kembalikan arah
        btnToggle.style.left = 'auto';
        btnToggle.style.right = '-120px';
        btnToggle.style.transform = 'translateY(-50%) scaleX(1)';
        
        title.innerText = 'SIMEMEK';
        subtitle.innerText = 'Smart Image Metadata Extraction Mapping Engine Kit';
        img.src = '/static/character-new2.png';
        img.onerror = null;
      }
    }, 300); // 300ms adalah setengah dari 0.6s
  }
  
  document.getElementById('btn-enter-game').addEventListener('click', () => {
    const bg = document.getElementById('bg-music');
    if (bg && bg.paused) {
      bg.volume = 0.5;
      bg.play().catch(e => console.log(e));
    }

    let name = document.getElementById('username-input').value.trim();
    if (!name) name = "GUEST_" + Math.floor(Math.random() * 999);
    localStorage.setItem('geoai_username', name.toUpperCase());
    
    // Tampilkan animasi opening
    document.getElementById('screen-name').style.display = 'none';
    document.getElementById('screen-opening').style.display = 'flex';
    
    const messages = [
      { progress: 5, text: "Initializing SIMEMEK AI Engine v1.0..." },
      { progress: 12, text: "Allocating memory buffers..." },
      { progress: 20, text: "Validating IDN.fgb geometry indices..." },
      { progress: 31, text: "Ensuring FGB file is perfectly readable..." },
      { progress: 42, text: "Establishing secure connection to imagery servers..." },
      { progress: 54, text: "Loading High-Res Mapping Data from ESRI..." },
      { progress: 66, text: "Warming up spatial algorithms..." },
      { progress: 75, text: "Preparing Collaborative WebSocket instances..." },
      { progress: 83, text: "Extracting Vector Tile Maps..." },
      { progress: 92, text: "Synchronizing Multi-user Workspace..." },
      { progress: 100, text: "System Online. Welcome to SIMEMEK." }
    ];

    const bar = document.getElementById('loading-bar');
    const pct = document.getElementById('loading-percent');
    const stat = document.getElementById('loading-status');
    
    let currentProgress = 0;
    let messageIndex = 0;

    const interval = setInterval(() => {
      // 10 seconds total = 100 steps * 100ms
      currentProgress += 1;
      if (currentProgress > 100) currentProgress = 100;
      
      bar.style.width = currentProgress + '%';
      pct.innerText = currentProgress + '%';

      if (messageIndex < messages.length && currentProgress >= messages[messageIndex].progress) {
        stat.innerText = messages[messageIndex].text;
        messageIndex++;
      }

      if (currentProgress === 100) {
        clearInterval(interval);
        setTimeout(() => {
          window.location.href = '/app';
        }, 800); // Tunggu sebentar sebelum pindah halaman
      }
    }, 100);
  });

  // Enter key support
  document.getElementById('username-input').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
      document.getElementById('btn-enter-game').click();
    }
  });

  // Handle auto-redirect from /app
  if (window.location.hash === '#name-input') {
    showNameScreen();
  }
</script>
</body>
</html>
